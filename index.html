<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ROUAGE P1 Player</title>
<style>
    body {
        margin: 0;
        font-family: sans-serif;
        background: #e6f2ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .container {
        text-align: center;
    }
    h1 {
        color: #007aff;
    }
    button {
        font-size: 24px;
        padding: 15px 40px;
        border: none;
        border-radius: 12px;
        background: #007aff;
        color: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="container">
    <h1>ROUAGE「プラネタリウム」専用Player</h1>
    <button onclick="togglePlay()">再生</button>
</div>

<audio id="audio" src="p.mp3" loop></audio>

<script>
let isPlaying = false;

const audio = document.getElementById("audio");

// Web Audio API
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const source = audioCtx.createMediaElementSource(audio);

// 🌊 固定イコライザ
const low = audioCtx.createBiquadFilter();
low.type = "lowshelf";
low.frequency.value = 80;
low.gain.value = 6;

const mid = audioCtx.createBiquadFilter();
mid.type = "peaking";
mid.frequency.value = 1000;
mid.gain.value = 0;

const high = audioCtx.createBiquadFilter();
high.type = "highshelf";
high.frequency.value = 8000;
high.gain.value = 3;

// 接続
source.connect(low);
low.connect(mid);
mid.connect(high);
high.connect(audioCtx.destination);

function togglePlay() {
    const button = document.querySelector("button");

    if (isPlaying) {
        audio.pause();
        button.textContent = "再生";
    } else {
        audioCtx.resume(); // iOS対応
        audio.play();
        button.textContent = "停止";
    }

    isPlaying = !isPlaying;
}
</script>

</body>
</html>
